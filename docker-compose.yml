# FastAPI + Streamlit. Weaviate runs on Weaviate Cloud — set WEAVIATE_* in .env.
services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      PYTHONDONTWRITEBYTECODE: "1"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    command: ["uv", "run", "uvicorn", "api:app", "--host", "0.0.0.0", "--port", "8000"]

  ui:
    build: .
    ports:
      - "8501:8501"
    environment:
      PYTHONDONTWRITEBYTECODE: "1"
      ADVANCED_RAG_API: http://api:8000
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    depends_on:
      - api
    command:
      [
        "uv", "run", "streamlit", "run", "ui.py",
        "--server.port=8501",
        "--server.address=0.0.0.0",
        "--server.headless=true",
        "--browser.gatherUsageStats=false",
      ]
